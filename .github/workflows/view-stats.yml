name: View Stats (On Demand)

on:
  workflow_dispatch:
    inputs:
      create_issue:
        description: 'Create an issue with stats'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  view-stats:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Generate and Display Statistics
      id: generate
      run: |
        npm run stats | tee stats_output.txt
        echo "✅ Statistics generated successfully!"
    
    - name: Create Stats Issue
      if: inputs.create_issue == true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const statsOutput = fs.readFileSync('stats_output.txt', 'utf8');
          const today = new Date().toISOString().split('T')[0];
          
          const streakData = JSON.parse(fs.readFileSync('streak.json', 'utf8'));
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `📊 Running Statistics - ${today}`,
            body: `# 🏃 Running Statistics Report
            
            **Generated**: ${today}
            **Streak**: ${streakData.current_streak} days | **Total**: ${streakData.total_days} runs
            
            \`\`\`
            ${statsOutput}
            \`\`\`
            `,
            labels: ['stats', 'on-demand']
          });
    
    - name: Summary
      run: |
        echo "## 📊 Statistics Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        head -n 50 stats_output.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Full statistics available in the workflow logs!" >> $GITHUB_STEP_SUMMARY
