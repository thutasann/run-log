name: Weekly Running Statistics

on:
  schedule:
    # Runs every Sunday at 8 PM UTC
    - cron: '0 20 * * 0'
  workflow_dispatch: # Allows manual trigger
  push:
    branches: [main, master]
    paths:
      - 'exercises.json'
      - 'streak.json'

permissions:
  contents: read
  issues: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Dependencies
      run: npm install
    
    - name: Generate Statistics Report
      id: stats
      run: |
        echo "Generating statistics..."
        npm run stats > stats_output.txt 2>&1
        
        # Store output for later use
        echo "STATS_GENERATED=true" >> $GITHUB_OUTPUT
    
    - name: Create Weekly Stats Issue
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const statsOutput = fs.readFileSync('stats_output.txt', 'utf8');
          
          const today = new Date().toISOString().split('T')[0];
          const weekNumber = Math.ceil((new Date().getDate()) / 7);
          
          // Read streak data
          const streakData = JSON.parse(fs.readFileSync('streak.json', 'utf8'));
          
          const title = `📊 Weekly Running Stats - ${today}`;
          
          const body = `# 🏃 Weekly Running Statistics Report
          
          **Generated on**: ${today}
          **Current Streak**: ${streakData.current_streak} days 🔥
          **Total Running Days**: ${streakData.total_days}
          **Last Run**: ${streakData.last_updated}
          
          ---
          
          ## 📈 Detailed Statistics
          
          \`\`\`
          ${statsOutput}
          \`\`\`
          
          ---
          
          💪 Keep pushing forward! Your consistency is building strength! 🏃‍♂️
          
          <details>
          <summary>📊 What's Next?</summary>
          
          ### Goals to Consider:
          - 🎯 Maintain your current streak
          - 📈 Increase running frequency
          - 🗓️ Plan runs for your rest days
          - 💪 Challenge yourself with a longer streak
          
          </details>
          `;
          
          // Create the issue
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['stats', 'weekly-report', 'automated']
          });
          
          console.log('✅ Created weekly stats issue');
    
    - name: Comment on Commit (for push events)
      if: github.event_name == 'push'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const statsOutput = fs.readFileSync('stats_output.txt', 'utf8');
          
          // Get the commit SHA
          const sha = context.sha;
          
          // Create a check run with the stats
          await github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: sha,
            body: `## 📊 Running Statistics Updated
            
            Your running statistics have been updated! 🎉
            
            <details>
            <summary>View Full Statistics</summary>
            
            \`\`\`
            ${statsOutput.substring(0, 1000)}...
            \`\`\`
            
            </details>
            
            Run \`npm run stats\` locally to see the complete report.`
          });
          
          console.log('✅ Added stats comment to commit');
    
    - name: Upload Stats Artifact
      uses: actions/upload-artifact@v4
      with:
        name: running-stats-${{ github.run_number }}
        path: stats_output.txt
        retention-days: 90
